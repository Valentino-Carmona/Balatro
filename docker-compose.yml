
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    networks:
      - balatro-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api/v1/game}
    ports:
      - "5173:80" # Mapeamos el puerto 80 del contenedor Nginx al puerto 5173 para respetar la info de desarrollo
    depends_on:
      - backend
    networks:
      - balatro-net
    restart: unless-stopped

networks:
  balatro-net:
    driver: bridge
